name: OEMAG Strompreis Scraper

on:
  schedule:
    - cron: "0 6 * * *" # Läuft täglich um 06:00 UTC (07:00 / 08:00 MEZ/MESZ)
  workflow_dispatch: # Erlaubt das manuelle Starten über die GitHub UI

permissions:
  contents: write # Wichtig, damit der Bot ins Repo pushen darf

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        run: python scrape.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preis.json
          # Commit nur ausführen, wenn sich die Datei auch wirklich geändert hat
          git commit -m "Automated Update: preis.json" || exit 0
          git push
